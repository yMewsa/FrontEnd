<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://thymeleaf.org">
<head>
    <!-- Required Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Listar Funcionários</title>
</head>

<body>
    <div class="container">
        <!-- Navbar -->
         <div th:insert="{fragmentos/header :: header}"></div>
         <h4>Listar Funcionários</h4>
         <table class="table-hover">
            <thead>
                <tr>
                    <th scope="col">Nome:</th>
                    <th scope="col">E-mail</th>
                </tr>
            </thead>
            <tbody>
                <!-- Listar o funcionário da lista de funcionários -->
                 <tr th:each="funcionario : ${funcionarios}">
                    <td><span th:text="${funcionario.nome}"></span></td>
                    <td><span th:text="${funcionario.email}"></span></td>
                    <td><a th:href="@{'/deletarfuncionario/'+${funcionario.id}}" class="waves-effect waves-light btn-small">
                        <button type="button" class="btn btn-danger">Excluir</button>
                    </a></td>
                    <td><a th:href="@{'/editarfuncionario/'+${funcionario.id}}" class="waves-effect waves-light btn-small">
                        <button type="button" class="btn btn-primary">Editar</button>
                    </a></td>
                 </tr>
            </tbody>
         </table>
    </div>
</body>
</html>
