<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Materiais | SGE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <div th:include="~{fragments/header :: header}"></div>
    <main class="senai-main">
        <div class="senai-shell" style="flex-direction: column; align-items: stretch;">
            <h1 class="senai-title">Estoque de Materiais</h1>
            
            <div class="senai-card" style="margin-top: 20px;">
                <form id="formMaterial" class="senai-form" style="grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" id="nomeMat" class="senai-input" placeholder="Nome do Material" required>
                    <select id="catMat" class="senai-input" required><option value="">Selecione a Categoria</option></select>
                    <input type="text" id="unidadeMat" class="senai-input" placeholder="Unidade (ex: UN, KG, METRO)" required>
                    <input type="number" id="minMat" class="senai-input" placeholder="Estoque Mínimo" required>
                    <button type="submit" class="senai-button" style="grid-column: span 2;">Cadastrar Material</button>
                </form>
            </div>

            <table style="width: 100%; margin-top: 20px; text-align: left; border-collapse: collapse;">
                <thead style="background: #1F2937; color: white;">
                    <tr><th>Nome</th><th>Categoria</th><th>Unidade</th><th>Estoque Atual</th><th>Status</th></tr>
                </thead>
                <tbody id="tabelaMateriais"></tbody>
            </table>
        </div>
    </main>

    <script>
        async function carregarDropdown() {
            const res = await fetch('/api/categorias');
            const categorias = await res.json();
            const select = document.getElementById('catMat');
            categorias.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
        }

        async function carregarMateriais() {
            const response = await fetch('/api/materiais');
            const materiais = await response.json();
            const tbody = document.getElementById('tabelaMateriais');
            tbody.innerHTML = '';
            materiais.forEach(m => {
                // Lógica de alerta visual (RF06)
                let status = m.quantidadeAtual <= m.quantidadeMinima 
                    ? '<span style="color: red; font-weight: bold;">Estoque Baixo!</span>' 
                    : '<span style="color: green;">OK</span>';

                tbody.innerHTML += `<tr>
                    <td style="padding: 10px; border-bottom: 1px solid #ccc;">${m.nome}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #ccc;">${m.categoria.nome}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #ccc;">${m.unidadeMedida}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #ccc;"><b>${m.quantidadeAtual}</b></td>
                    <td style="padding: 10px; border-bottom: 1px solid #ccc;">${status}</td>
                </tr>`;
            });
        }

        document.getElementById('formMaterial').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                nome: document.getElementById('nomeMat').value,
                unidadeMedida: document.getElementById('unidadeMat').value,
                quantidadeMinima: document.getElementById('minMat').value,
                quantidadeAtual: 0, // Começa zerado, abastecido via Movimentação
                categoria: { id: document.getElementById('catMat').value }
            };
            await fetch('/api/materiais', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            e.target.reset();
            carregarMateriais();
        });

        carregarDropdown();
        carregarMateriais();
    </script>
</body>
</html>
