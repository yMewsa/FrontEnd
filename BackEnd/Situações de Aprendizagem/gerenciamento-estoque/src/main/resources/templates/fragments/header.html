<header th:fragment="header" class="senai-header">
	<div class="senai-shell">
		<a class="senai-brand" th:href="@{/}">
			<img class="senai-logo" th:src="@{/img/logo-senai.png}" alt="SENAI-SP"/>
			<span class="senai-brand-text">Sistema de Estoque e Patrimônio</span>
		</a>

		<nav class="senai-nav" aria-label="Navegação principal">
			<th:block th:if="${session.usuarioLogado == null}">
				<a class="senai-link" th:href="@{/cadastro}">Cadastro</a>
				<a class="senai-button" th:href="@{/login}">Login</a>
			</th:block>

			<th:block th:if="${session.usuarioLogado != null}">
				<a class="senai-link" th:href="@{/app/categorias}">Categorias</a>
				<a class="senai-link" th:href="@{/app/materiais}">Estoque</a>
				<a class="senai-link" th:href="@{/app/ativos}">Patrimônio</a>
				<a class="senai-link" th:href="@{/app/movimentacoes}">Movimentações</a>
				<a class="senai-button" th:href="@{/logout}" style="background-color: #1F2937;">Sair</a>
			</th:block>
		</nav>
	</div>
</header>
